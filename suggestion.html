<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suggestions — Devil’s Roulette</title>

  <link rel="icon" type="image/png" href="images/dice.png">
  <link rel="stylesheet" href="devilsroulette.css" />

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: 'Orbitron', sans-serif;
      margin: 0;
    }

    .suggestion-container {
      max-width: 800px;
      margin: 100px auto;
      padding: 30px;
      background: rgba(0,0,0,0.8);
      border: 1px solid #ff2a2a;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
      text-align: center;
    }

    .suggestion-container h1 {
      color: #ff2a2a;
      margin-bottom: 10px;
    }

    .suggestion-container p {
      opacity: 0.8;
      margin-bottom: 25px;
    }

    textarea {
      width: 100%;
      height: 150px;
      background: #111;
      border: 1px solid #ff2a2a;
      border-radius: 8px;
      color: white;
      padding: 15px;
      font-size: 14px;
      resize: none;
      outline: none;
    }

    textarea:focus {
      box-shadow: 0 0 10px #ff2a2a;
    }

    .submit-btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #ff2a2a;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .submit-btn:hover {
      background: #ff5555;
      transform: scale(1.05);
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover {
      color: white;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<!-- Header (matches your site) -->
<header class="dr-header">
  <div class="dr-container dr-header-flex">
    <h1 class="dr-logo">🎲 Devil’s <span>Roulette</span></h1>
    <nav class="dr-nav">
      <a href="devilsroulette.html">Home</a>
      <a href="about.html">About</a>
      <a href="community.html">Community</a>
      <a href="information.html">Information</a>
      <a href="overview.html">Overview</a>
      <a href="event.html">Events</a>
      <a href="drvideos.html">Videos</a>
      <a href="suggestion.html" class="active">Suggestions</a>
    </nav>
  </div>
</header>

<!-- Suggestion Box -->
<div class="suggestion-container">
  <h1>💡 Submit a Suggestion</h1>
  <p>Got an idea? Drop it below. If it's good, it might get added 👀</p>

  <textarea id="suggestionInput" placeholder="Type your suggestion here..."></textarea>

  <button class="submit-btn" onclick="sendSuggestion()">Submit Suggestion</button>

  <div class="status" id="statusText"></div>

  <a href="devilsroulette.html" class="back-link">← Back to Home</a>
</div>

<script>
async function sendSuggestion() {
  const input = document.getElementById("suggestionInput");
  const status = document.getElementById("statusText");
  const suggestion = input.value.trim();

  if (!suggestion) {
    status.innerText = "⚠️ Please write something first.";
    return;
  }

  status.innerText = "⏳ Sending...";

  try {
    const res = await fetch("/api/suggest", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    suggestion: suggestion
  })
});

    if (res.ok) {
      status.innerText = "✅ Suggestion sent!";
      input.value = "";
    } else {
      status.innerText = "❌ Failed to send.";
    }

  } catch (err) {
    status.innerText = "❌ Error connecting to server.";
  }
}
</script>

</body>
</html>
