<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Truth Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    background: black;
    color: red;
    font-family: 'Orbitron', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    text-align: center;
}

.container {
    max-width: 700px;
    padding: 30px;
}

h1 {
    font-size: 42px;
    margin-bottom: 10px;
}

p {
    opacity: 0.8;
}

input {
    width: 350px;
    padding: 14px;
    background: #111;
    border: 1px solid red;
    color: white;
    font-size: 18px;
    margin-top: 20px;
    outline: none;
}

button {
    padding: 14px 24px;
    margin-top: 15px;
    background: darkred;
    border: none;
    color: white;
    cursor: pointer;
    font-size: 16px;
    font-family: inherit;
}

button:hover {
    opacity: 0.85;
}

#error {
    margin-top: 20px;
    color: crimson;
}
</style>
</head>
<body>

<div id="pageBackground"></div>

<div class="container">
    <h1>ACCESS TERMINAL</h1>
    <p>The truth has been shattered into fragments.</p>
    <p>Only those who know the codes may proceed.</p>
    <p>Just remember.... <h2>Don't Trust Nobody...</h2></p>

    <input type="text" id="codeInput" placeholder="Enter discovered phrase">
    <br>
    <button onclick="checkCode()">ACCESS</button>

    <p id="error"></p>
</div>

<!-- MUSIC -->
<audio id="bgMusic" src="media/Encrypted.mp3" autoplay loop></audio>

<script>
const music = document.getElementById("bgMusic");

// autoplay fallback for mobile browsers
document.addEventListener("click", () => {
    music.play().catch(() => {});
}, { once: true });

async function sha256(text) {
    const buffer = new TextEncoder().encode(text.toLowerCase().trim());
    const hashBuffer = await crypto.subtle.digest("SHA-256", buffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

const routes = {
    "46ba792e111edff1809b19e39915dc8f8b6bdb4b8a92bdd31a43ca183ab8b8d1": "UGFydDE=.html",
    "35085037775aceb43d68e8ac370e89978227449083fde02eba7fc9e345d7e38d": "UGFydCAyLg==.html",
    "d7f9437e0b25b219ac83ff347506515e0d06338aa31169868fa66fc2d3ffb6e4": "UHJvZ3Jlc3Mu.html",
    "faeca94148f9ba614e6e2c1120d67626f6e7286b43e922fe161f54f9fc804083": "fragment-four.html",
    "d7015676f4294d5acba6bfce8512cfd07d09ae0b3f7e53d9f3689baa06cc04d2": "fragment-five.html",
    "d2ea29b8c91a28b2efb11d733b32919ac9c912910a473ac35d4f00b715baaad7": "fragment-six.html",
    "24eb5bc78ee10dfbebf4874004de463b474ba3f7c8faf76a0f16b4cb411cc12e": "fragment-seven.html",
    "f88c4502edf2b76c2e26c6e1b9761de5de9e1c8ac576171ff2549f52500c446e": "VGhlIFNlY3JldCBJcyBSZXZlYWxlZC4uLg==.html"
};

async function checkCode() {
    const input = document.getElementById("codeInput").value;
    const hash = await sha256(input);

    if (routes[hash]) {
        window.location.href = routes[hash];
    } else {
        document.getElementById("error").innerText = "ACCESS DENIED";
    }
}

document.getElementById("codeInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        checkCode();
    }
});
</script>

</body>
</html>
