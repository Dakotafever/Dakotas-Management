<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devil's Roulette Assistant</title>

<link rel="stylesheet" href="devilsroulette.css">

<style>
.chat-container{
  max-width:900px;
  margin:80px auto;
}

#chat{
  height:500px;
  overflow-y:auto;
  border:1px solid #ff2a2a;
  padding:15px;
  background:#111;
}

.message{
  margin:10px 0;
}

.user{
  color:#ff7070;
}

.bot{
  color:#ffffff;
}

.input-area{
  display:flex;
  margin-top:10px;
}

.input-area input{
  flex:1;
  padding:10px;
}

.input-area button{
  padding:10px 20px;
}
</style>
</head>

<body>

<div class="chat-container">

<h1>🎲 Devil's Roulette Assistant</h1>

<div id="chat"></div>

<div class="input-area">
  <input id="message" placeholder="Ask about Devil's Roulette...">
  <button onclick="sendMessage()">Send</button>
</div>

</div>

<script>
async function sendMessage(){

  const input=document.getElementById("message");
  const chat=document.getElementById("chat");

  const text=input.value.trim();

  if(!text) return;

  chat.innerHTML += `
    <div class="message user">
      <strong>You:</strong> ${text}
    </div>
  `;

  input.value="";

  const res=await fetch("/api/chat",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      message:text
    })
  });

  const data=await res.json();

  chat.innerHTML += `
    <div class="message bot">
      <strong>Assistant:</strong> ${data.reply}
    </div>
  `;

  chat.scrollTop=chat.scrollHeight;
}
</script>

</body>
</html>
