<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devil's Roulette Admin</title>

<link rel="stylesheet" href="devilsroulette.css">

<style>
.admin-box {
  max-width: 800px;
  margin: 80px auto;
  padding: 20px;
  background: rgba(0,0,0,0.85);
  border: 1px solid #ff2a2a;
  border-radius: 10px;
}

input, textarea {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  background: #111;
  color: white;
  border: 1px solid #ff2a2a;
}

button {
  padding: 10px 20px;
  background: #ff2a2a;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<header class="dr-header">
  <div class="dr-container dr-header-flex">
    <h1 class="dr-logo">🎲 Admin Panel</h1>
  </div>
</header>

<div class="admin-box">

  <div id="loginBox">
    <h2>Login</h2>
    <input id="password" type="password" placeholder="Admin Password">
    <button onclick="login()">Enter</button>
    <p id="status"></p>
  </div>

  <div id="panel" style="display:none;">
    <h2>AI Edit Request</h2>

    <textarea id="request" placeholder="Example: Change event title to Summer Update"></textarea>

    <button onclick="sendRequest()">Send to AI</button>

    <h3>AI Generated Edit</h3>

<textarea
  id="output"
  style="
    width:100%;
    height:300px;
    background:#111;
    color:white;
    border:1px solid #ff2a2a;
    padding:10px;
  "
></textarea>

<br><br>

<button onclick="sendToDiscord()">
  Send To Discord
</button>

<p id="discordStatus"></p>
  </div>

</div>

<script>
async function login() {

  const password = document.getElementById("password").value;

  const res = await fetch("/api/admin-login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ password })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    document.getElementById("status").innerText = "Wrong password";
  }
}

async function sendRequest() {

  const request =
    document.getElementById("request").value;

  const res = await fetch("/api/ai-edit", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      request
    })
  });

  const data = await res.json();

  if (data.suggestion) {

  document.getElementById("output").value =
    JSON.stringify(data.suggestion, null, 2);

} else {

  document.getElementById("output").value =
    JSON.stringify(data, null, 2);

}

async function sendToDiscord() {

  const editedSuggestion =
    document.getElementById("output").value;

  const status =
    document.getElementById("discordStatus");

  status.innerText = "Sending...";

  const res = await fetch("/api/send-change", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      suggestion: JSON.parse(editedSuggestion)
    })
  });

  if (res.ok) {
    status.innerText =
      "✅ Sent to Discord successfully.";
  } else {
    status.innerText =
      "❌ Failed to send.";
  }
}

</script>
</body>
</html>
